<!DOCTYPE html>
<html>
  <head>
    <title>Assignment3</title>
    <meta name="viewport" content="user-scalable=no,initial-scale=1,maximum-scale=1">
    <style>
      @font-face {
        font-family: 'SongamLeeHyeongSik';
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2604-1@1.0/SongamIhyeongsik-Regular.woff2') format('woff2');
        font-weight: normal;
        font-display: swap;
      }

      body {
        font-family: 'SongamLeeHyeongSik', serif;
        background-image: url('bgDesktop.png');
        background-size: cover;
      }

      div {
        width: 320px;
        height: 500px;
        margin: 0 auto;
        padding: 50px 0;
      }

      h1 {
        font-size: 40px;
        text-align: center;
        line-height: 1.5;
        margin: 0 3px;
        padding: 10px;
      }

      p {
        font-size: 25px;
        text-align: center;
        margin: 0 3px;
        padding: 10px;
        line-height: 1.5;
      }

      #author {
        font-size: 23px;
        text-align: right;
        line-height: 1.5;
        margin: 0 3px;
        padding: 10px;
      }

      @media screen and (max-width: 767px) {
        body {
          background-image: url('bgMobile.png');
        }
      }

    </style>
  </head>
  <body>
    <div>
      <h1>먼 훗날</h1>
      <p id="author">김소월</p>
      <p>먼 훗날 당신이 찾으시면<br>그때의 내 말은 잊었노라.</p>
      <p>당신의 속으로 나무라면<br>무척 그리다가 잊었노라.</p>
      <p>그래도 당신이 나무라면<br>믿기지 않아서 잊었노라.</p>
      <p>오늘도 어제도 아니잊고<br>먼 훗날 그때에 잊었노라.</p>
    </div>
  </body>
</html>
